    <!-- GALLERY MODE (default): one large photo, details on one line below,

      </div>
      <button type="button" class="nav-arrow next" id="next" aria-label="Next photo">&#8250;</button>
    </section>

    <!-- GRID MODE: jigsaw masonry that keeps each photo's own shape. -->
    <section id="grid" class="grid-masonry" hidden></section>
  </main>

      { src: "images/Rock%20%7C%20Victoria,%20BC,%20CAN.jpg", name: "Rock", loc: "Victoria, BC, CAN", meta: "Sony a7C II &bull; Sigma 24-70mm f/2.8 &bull; ISO 50" },
    ];

    let current = 0;
    let fadeTimer = null;
    const galleryImg   = document.getElementById('gallery-img');
    const galleryCap   = document.getElementById('gallery-cap');
    const galleryStage = document.querySelector('.gallery-stage');
    const gridSection  = document.getElementById('grid');
    const gallerySection = document.getElementById('gallery');

    // --- Gallery: crossfade to a photo, with its details on one line below ---
    function renderGallery(p) {
      galleryImg.alt = p.name;
      galleryImg.src = p.src;
      galleryCap.innerHTML = p.name + '&nbsp;&nbsp;|&nbsp;&nbsp;' + p.loc +
                             '&nbsp;&nbsp;|&nbsp;&nbsp;' + p.meta;
    }
    function showGallery(i) {
      current = (i + photos.length) % photos.length;   // wrap around
      const p = photos[current];
      galleryStage.style.opacity = 0;                  // fade the current photo out
      clearTimeout(fadeTimer);
      fadeTimer = setTimeout(() => {
        renderGallery(p);
        const reveal = () => { galleryStage.style.opacity = 1; };   // fade the new one in
        if (galleryImg.complete) reveal();
        else galleryImg.onload = reveal;
      }, 220);                                          // wait out the fade-out first
    }
    document.getElementById('prev').addEventListener('click', () => showGallery(current - 1));
    document.getElementById('next').addEventListener('click', () => showGallery(current + 1));
    document.addEventListener('keydown', (e) => {
      if (gallerySection.hidden) return;
      if (e.key === 'ArrowLeft')  showGallery(current - 1);
      if (e.key === 'ArrowRight') showGallery(current + 1);
    });

    // --- Grid: build the jigsaw once, with the same hover detail bar as before ---
    photos.forEach((p, index) => {
      const fig = document.createElement('figure');
      fig.tabIndex = 0;
      const img = document.createElement('img');
      img.src = p.src; img.alt = p.name; img.loading = 'lazy';
      const ov = document.createElement('div');
      ov.className = 'overlay';
      ov.innerHTML = '<div class="ov-name"></div><div class="ov-loc"></div><div class="ov-meta"></div>';
      ov.querySelector('.ov-name').textContent = p.name;
      ov.querySelector('.ov-loc').textContent  = p.loc;
      ov.querySelector('.ov-meta').innerHTML    = p.meta;
      fig.appendChild(img);
      fig.appendChild(ov);
      // Clicking (or pressing Enter on) a grid photo opens it in gallery mode.
      const openInGallery = () => { setMode('gallery'); showGallery(index); window.scrollTo(0, 0); };
      fig.addEventListener('click', openInGallery);
      fig.addEventListener('keydown', (e) => {
        if (e.key === 'Enter' || e.key === ' ') { e.preventDefault(); openInGallery(); }
      });
      gridSection.appendChild(fig);
    });

    // --- Mode switching ---
    const btnGallery = document.getElementById('btn-gallery');
    const btnGrid    = document.getElementById('btn-grid');
    function setMode(mode) {
      const galleryOn = (mode === 'gallery');
      gallerySection.hidden = !galleryOn;
      gridSection.hidden = galleryOn;
      btnGallery.classList.toggle('active', galleryOn);
      btnGrid.classList.toggle('active', !galleryOn);
    }
    btnGallery.addEventListener('click', () => setMode('gallery'));
    btnGrid.addEventListener('click', () => setMode('grid'));

    // Start on the first photo in gallery mode.
    showGallery(0);
    setMode('gallery');
  </script>
